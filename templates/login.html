<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Login | Sistema de Estoque</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card auth-card-premium">

      <div class="auth-header">
        <div class="auth-logo">📦</div>
        <div>
          <h2>Sistema de Estoque</h2>
          <p>Acesse sua conta</p>
        </div>
      </div>

      {% if erro %}
        <div class="alert alert-danger" role="alert">
          <div class="alert-icon">⚠️</div>
          <div class="alert-text"><strong>Atenção:</strong> {{ erro }}</div>
        </div>
      {% endif %}

      <form method="POST" class="auth-form">
        <div class="field">
          <span class="field-icon">👤</span>
          <input type="text" name="usuario" placeholder="Usuário" required autocomplete="username">
        </div>

        <div class="field">
          <span class="field-icon">🔒</span>
          <input type="password" name="senha" placeholder="Senha" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-primary">Entrar</button>
      </form>

      <div class="auth-footer">
        <span>Não tem conta?</span>
        <a href="/register">Criar conta</a>
      </div>

    </div>
  </div>
</body>
</html>
